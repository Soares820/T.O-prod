<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="shine" x1="36" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Squircle background -->
  <rect width="72" height="72" rx="16" fill="url(#bg)"/>
  <rect width="72" height="40" rx="16" fill="url(#shine)"/>

  <!-- Letter T: horizontal bar -->
  <rect x="11" y="16" width="22" height="7" rx="3.5" fill="white"/>
  <!-- Letter T: vertical stem -->
  <rect x="18.5" y="16" width="7" height="22" rx="3.5" fill="white"/>

  <!-- Letter O: thick ring -->
  <circle cx="50" cy="47" r="10" stroke="white" stroke-width="6" fill="none"/>

  <!-- Connecting dot accent -->
  <circle cx="36" cy="32" r="2.5" fill="#93C5FD" opacity="0.8"/>
</svg>
