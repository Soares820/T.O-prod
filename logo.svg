<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 72" fill="none">
  <defs>
    <linearGradient id="mk" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0d1f4a"/>
    </linearGradient>
    <linearGradient id="hi" x1="36" y1="0" x2="36" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Squircle background -->
  <rect width="72" height="72" rx="18" fill="url(#mk)"/>
  <!-- Subtle top highlight -->
  <rect width="72" height="38" rx="18" fill="url(#hi)"/>

  <!-- T: bold rounded crossbar -->
  <rect x="9" y="15" width="30" height="8" rx="4" fill="white"/>
  <!-- T: bold rounded stem -->
  <rect x="20" y="15" width="8" height="28" rx="4" fill="white"/>

  <!-- O: ring, offset diagonally to lower-right (suggests movement/trajectory) -->
  <circle cx="55" cy="47" r="11" stroke="white" stroke-width="4.5" fill="none"/>

  <!-- Wordmark: T.O -->
  <text x="88" y="43"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-weight="800"
    font-size="30"
    fill="#0d1f4a"
    letter-spacing="-1">T.O</text>

  <!-- Wordmark: PLATAFORMA -->
  <text x="89" y="62"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-weight="400"
    font-size="11.5"
    fill="#3B82F6"
    letter-spacing="3.5">PLATAFORMA</text>
</svg>
